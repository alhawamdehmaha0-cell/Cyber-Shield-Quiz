kind = "web"
previewPath = "/"
title = "اختبار الأمن السيبراني"
version = "1.0.0"
id = "artifacts/cyber-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21938

[services.development]
run = "pnpm --filter @workspace/cyber-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyber-quiz", "run", "build" ]
publicDir = "artifacts/cyber-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21938"
BASE_PATH = "/"
